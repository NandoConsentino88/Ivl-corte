<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="100" fill="#1A1A2E"/>
  <defs>
    <linearGradient id="logo-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#00D4FF" />
      <stop offset="100%" stopColor="#C9A84C" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g transform="translate(56, 56) scale(4)">
    {/* Hexagonal Frame */}
    <path d="M50 8L88 30V70L50 92L12 70V30L50 8Z" stroke="url(#logo-border-grad)" strokeWidth="6" strokeLinejoin="round" />
    <path d="M50 15L80 32V68L50 85L20 68V32L50 15Z" fill="rgba(0, 212, 255, 0.08)" />
    
    {/* Stylized IVL */}
    <text 
      x="50" y="61" 
      font-family="system-ui, sans-serif" 
      font-size="24" 
      font-weight="900" 
      fill="white" 
      text-anchor="middle" 
      letter-spacing="-0.5"
    >
      IVL
    </text>

    {/* Decoration lines (Cuts) */}
    <path d="M35 25L65 25" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4" />
    <path d="M35 75L65 75" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4" />
  </g>
</svg>
