<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IVL App - Gestão de Corte e Risco</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <meta name="theme-color" content="#1A1A2E" />
    <link rel="apple-touch-icon" href="logo.svg" />
  </head>
  <body style="background-color: #1A1A2E; margin: 0; padding: 0;">
    <div id="root">
      <div id="loading-fallback" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: white; text-align: center; background: #1A1A2E;">
        <div style="width: 40px; height: 40px; border: 4px solid #C9A84C; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: bold; color: #9CA3AF; letter-spacing: 2px; font-size: 10px; text-transform: uppercase;">Iniciando Sistema IVL...</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    </div>
    
    <script>
      // Emergency Error Logger (Executes before any modules)
      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="background:#1a1a2e;color:#ff6b6b;padding:40px;height:100vh;font-family:sans-serif;box-sizing:border-box;">' +
            '<h1 style="font-size:20px;">IVL System: Falha Crítica</h1>' +
            '<p style="color:#fff;opacity:0.6;font-size:14px;">O aplicativo não pôde ser carregado na hospedagem Netlify.</p>' +
            '<div style="background:rgba(0,0,0,0.5);padding:20px;border-radius:10px;font-family:monospace;font-size:12px;margin-top:20px;border:1px solid rgba(255,255,255,0.1);">' +
            '<strong>ERRO:</strong> ' + msg + '<br><strong>LOC:</strong> ' + line + ':' + col + '</div>' +
            '<button onclick="window.location.reload()" style="margin-top:20px;padding:10px 20px;background:#c9a84c;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">REPETIR CARREGAMENTO</button>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
